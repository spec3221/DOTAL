<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dota 2 Visual Draft</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #121212; color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 15px; user-select: none;
        }
        
        /* Панель выбранных героев (ТЕПЕРЬ С КАРТИНКАМИ) */
        .status-panel { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-row { font-weight: bold; font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .status-row:last-child { margin-bottom: 0; }
        
        /* Контейнер для маленьких иконок сверху */
        .selected-heroes { display: flex; gap: 8px; margin-top: 8px; min-height: 40px; flex-wrap: wrap;}
        .selected-heroes img { 
            width: 65px; height: 36px; object-fit: cover; border-radius: 6px; 
            border: 1px solid #444; box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        .empty-text { color: #555; font-weight: normal; font-size: 14px; line-height: 36px; }

        /* Переключатель режимов */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; background: #2a2a2a; color: #aaa; transition: 0.2s;
        }
        .tab-btn.active-enemy { background: #e53935; color: white; box-shadow: 0 0 10px rgba(229, 57, 53, 0.4); }
        .tab-btn.active-ally { background: #43a047; color: white; box-shadow: 0 0 10px rgba(67, 160, 71, 0.4); }

        /* Поиск */
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #1e1e1e; color: white; box-sizing: border-box; font-size: 16px; margin-bottom: 15px;
        }
        input:focus { outline: none; border-color: #777; }

        /* Сетка героев */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 8px; max-height: 45vh; overflow-y: auto; padding-bottom: 20px;
        }
        .hero-card { 
            position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; 
            border: 2px solid transparent; transition: 0.1s; background: #222;
        }
        .hero-card img { width: 100%; height: auto; display: block; }
        
        /* Эффекты выбора в сетке */
        .hero-card.enemy { border-color: #e53935; filter: brightness(0.5); }
        .hero-card.ally { border-color: #43a047; filter: brightness(0.5); }
        
        .hero-name-badge {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8);
            font-size: 10px; text-align: center; padding: 3px 0; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;
        }

        /* Главная кнопка */
        .submit-btn {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            width: calc(100% - 30px); padding: 16px; background: linear-gradient(135deg, #e53935, #b71c1c); 
            color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; 
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(229, 57, 53, 0.4); z-index: 10;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <div class="status-row">🔴 Вражеский пик (до 5): 
            <div class="selected-heroes" id="enemy-list"><span class="empty-text">Пока никого не выбрали</span></div>
        </div>
        <div class="status-row">🟢 Союзный пик (до 4): 
            <div class="selected-heroes" id="ally-list"><span class="empty-text">Пока никого не выбрали</span></div>
        </div>
    </div>

    <div class="tabs">
        <button id="btn-enemy" class="tab-btn active-enemy" onclick="setMode('enemy')">🔴 Выбор Врагов</button>
        <button id="btn-ally" class="tab-btn" onclick="setMode('ally')">🟢 Выбор Союзников</button>
    </div>

    <input type="text" id="search" placeholder="Поиск героя..." oninput="filterHeroes()">

    <div class="grid" id="heroes-grid">
        <p style="text-align: center; width: 100%; color: #aaa;">Загрузка списка героев...</p>
    </div>

    <div style="height: 70px;"></div> 

    <button class="submit-btn" onclick="sendDraft()">Анализировать Драфт</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let heroesData = [];
        let enemies = []; // Теперь тут хранятся объекты: {id, name, img}
        let allies = [];  // Теперь тут хранятся объекты: {id, name, img}
        let currentMode = 'enemy';

        async function fetchHeroes() {
            try {
                const response = await fetch('https://api.opendota.com/api/heroStats');
                heroesData = await response.json();
                heroesData.sort((a, b) => a.localized_name.localeCompare(b.localized_name));
                renderGrid();
            } catch (error) {
                document.getElementById('heroes-grid').innerHTML = '<p style="color:red; text-align:center;">Ошибка загрузки базы. Проверьте интернет.</p>';
            }
        }

        function renderGrid(searchQuery = '') {
            const grid = document.getElementById('heroes-grid');
            grid.innerHTML = '';

            heroesData.forEach(hero => {
                const name = hero.localized_name;
                if (searchQuery && !name.toLowerCase().includes(searchQuery.toLowerCase())) return;

                // ИСПОЛЬЗУЕМ СЕРВЕРА STEAM (CDN) ДЛЯ КАРТИНОК, ЧТОБЫ ОНИ НЕ ЛОМАЛИСЬ
                const imgUrl = `https://cdn.cloudflare.steamstatic.com${hero.img}`;

                const card = document.createElement('div');
                card.className = 'hero-card';
                card.id = `hero-${hero.id}`;
                card.onclick = () => toggleHero(name, hero.id, imgUrl);

                if (enemies.some(e => e.id === hero.id)) card.classList.add('enemy');
                else if (allies.some(a => a.id === hero.id)) card.classList.add('ally');

                card.innerHTML = `
                    <img src="${imgUrl}" alt="${name}" loading="lazy">
                    <div class="hero-name-badge">${name}</div>
                `;
                grid.appendChild(card);
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-enemy').className = 'tab-btn ' + (mode === 'enemy' ? 'active-enemy' : '');
            document.getElementById('btn-ally').className = 'tab-btn ' + (mode === 'ally' ? 'active-ally' : '');
        }

        function toggleHero(name, id, imgUrl) {
            const card = document.getElementById(`hero-${id}`);
            const heroObj = { id, name, img: imgUrl };

            if (currentMode === 'enemy') {
                if (enemies.some(e => e.id === id)) {
                    enemies = enemies.filter(e => e.id !== id);
                    card.classList.remove('enemy');
                } else {
                    if (allies.some(a => a.id === id)) return tg.showAlert("Этот герой уже в союзниках!");
                    if (enemies.length >= 5) return tg.showAlert("Максимум 5 врагов!");
                    enemies.push(heroObj);
                    card.classList.add('enemy');
                }
            } else {
                if (allies.some(a => a.id === id)) {
                    allies = allies.filter(a => a.id !== id);
                    card.classList.remove('ally');
                } else {
                    if (enemies.some(e => e.id === id)) return tg.showAlert("Этот герой уже во врагах!");
                    if (allies.length >= 4) return tg.showAlert("Максимум 4 союзника!");
                    allies.push(heroObj);
                    card.classList.add('ally');
                }
            }
            updateStatusPanel();
        }

        // РИСУЕМ КАРТИНКИ ВЕРХУ ВМЕСТО ТЕКСТА
        function updateStatusPanel() {
            const enemyList = document.getElementById('enemy-list');
            const allyList = document.getElementById('ally-list');

            if (enemies.length === 0) {
                enemyList.innerHTML = '<span class="empty-text">Пока никого не выбрали</span>';
            } else {
                enemyList.innerHTML = enemies.map(e => `<img src="${e.img}" alt="${e.name}">`).join('');
            }

            if (allies.length === 0) {
                allyList.innerHTML = '<span class="empty-text">Пока никого не выбрали</span>';
            } else {
                allyList.innerHTML = allies.map(a => `<img src="${a.img}" alt="${a.name}">`).join('');
            }
        }

        function filterHeroes() {
            const query = document.getElementById('search').value;
            renderGrid(query);
        }

        function sendDraft() {
            if (enemies.length === 0) {
                return tg.showAlert("Выбери хотя бы одного вражеского героя (нажми на картинку)!");
            }
            
            // Превращаем картинки обратно в имена через запятую для Python-бота
            const data = JSON.stringify({
                enemies: enemies.map(e => e.name).join(', '), 
                allies: allies.map(a => a.name).join(', ')
            });
            
            tg.sendData(data);
            tg.close();
        }

        fetchHeroes();
    </script>
</body>
</html>
