<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Draft Analyzer</title>
    <!-- Подключаем библиотеку Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        h2 {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #555;
        }
        .buttons-row {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        .btn-enemy {
            background-color: #d32f2f;
            color: white;
        }
        .btn-ally {
            background-color: #1976d2;
            color: white;
        }
        .btn-send {
            background-color: #388e3c;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .draft-section {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 60px;
        }
        .draft-section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .hero-tag {
            display: inline-block;
            background-color: #333;
            padding: 6px 12px;
            border-radius: 15px;
            margin: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .hero-tag.enemy-tag { border: 1px solid #d32f2f; }
        .hero-tag.ally-tag { border: 1px solid #1976d2; }
        .role-text { color: #ffb300; font-weight: bold; margin-left: 5px; }
        .hint { font-size: 12px; color: #777; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Анализатор Драфта</h2>

    <div class="input-group">
        <input type="text" id="heroNameInput" placeholder="Имя героя (на англ, напр. Axe)">
        <div class="buttons-row">
            <button class="btn-enemy" onclick="addHero('enemies')">Враг ⚔️</button>
            <button class="btn-ally" onclick="addHero('allies')">Союзник 🛡</button>
        </div>
    </div>

    <div class="draft-section">
        <h3>Вражеский пик:</h3>
        <div id="enemiesContainer"></div>
    </div>

    <div class="draft-section">
        <h3>Союзный пик:</h3>
        <div id="alliesContainer"></div>
    </div>
    
    <div class="hint">Нажми на героя в списке, чтобы удалить его</div>

    <button class="btn-send" onclick="sendToBot()">Анализировать пик 🚀</button>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем окно на весь экран телефона

        let draft = {
            enemies: [],
            allies: []
        };

        function addHero(team) {
            let input = document.getElementById("heroNameInput");
            let heroName = input.value.trim();

            if (!heroName) {
                tg.showAlert("Сначала введи имя героя!");
                return;
            }

            // Запрашиваем роль у пользователя
            let role = prompt(`Введи позицию для ${heroName} (от 1 до 5):\nОставь пустым, если позиция неизвестна.`, "");
            
            // Если пользователь нажал "Отмена" в окошке
            if (role === null) return; 
            
            // Если ничего не ввел
            if (role.trim() === "") {
                role = "?"; 
            }

            // Формируем объект героя
            let heroData = {
                name: heroName,
                role: role
            };

            draft[team].push(heroData);
            
            input.value = ""; // Очищаем поле ввода
            renderLists();
        }

        function removeHero(team, index) {
            draft[team].splice(index, 1);
            renderLists();
        }

        function renderLists() {
            let enemiesHtml = draft.enemies.map((h, index) => 
                `<div class="hero-tag enemy-tag" onclick="removeHero('enemies', ${index})">
                    ${h.name} <span class="role-text">[Поз: ${h.role}]</span>
                </div>`
            ).join('');
            
            let alliesHtml = draft.allies.map((h, index) => 
                `<div class="hero-tag ally-tag" onclick="removeHero('allies', ${index})">
                    ${h.name} <span class="role-text">[Поз: ${h.role}]</span>
                </div>`
            ).join('');

            document.getElementById("enemiesContainer").innerHTML = enemiesHtml;
            document.getElementById("alliesContainer").innerHTML = alliesHtml;
        }

        function sendToBot() {
            if (draft.enemies.length === 0) {
                tg.showAlert("Добавь хотя бы одного врага для анализа!");
                return;
            }

            // Превращаем массивы объектов обратно в строки вида "Axe:3, Lion:4" для Питона
            let enemiesString = draft.enemies.map(h => `${h.name}:${h.role}`).join(", ");
            let alliesString = draft.allies.map(h => `${h.name}:${h.role}`).join(", ");

            let dataToSend = {
                enemies: enemiesString,
                allies: alliesString
            };

            // Отправляем JSON строку в Telegram бота
            tg.sendData(JSON.stringify(dataToSend));
        }
    </script>
</body>
</html>
